name: Photos Hurl Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hurl:
    name: Hurl Integration Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @pmf/photos...

      - name: Install Hurl
        run: |
          HURL_VERSION="6.1.1"
          curl -fsSL "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl-${HURL_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /tmp
          sudo mv "/tmp/hurl-${HURL_VERSION}-x86_64-unknown-linux-gnu/bin/hurl" /usr/local/bin/hurl
          hurl --version

      - name: Run Hurl integration tests
        run: bash apps/photos/bin/test-hurl

      - name: Upload LocalStack logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: localstack-logs
          path: apps/photos/dist/localstack.log
          retention-days: 7

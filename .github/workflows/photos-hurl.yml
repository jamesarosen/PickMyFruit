name: Photos Hurl Integration Tests

on:
  push:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hurl:
    name: Hurl Integration Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build photos service
        run: pnpm --filter @pmf/photos build

      - name: Install Hurl
        uses: gacts/install-hurl@v1

      - name: Run Hurl integration tests
        run: bash apps/photos/bin/test-hurl --skip-build

      - name: Upload LocalStack logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: localstack-logs
          path: apps/photos/dist/localstack.log
          retention-days: 7

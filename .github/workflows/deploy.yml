name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    types: [closed]
  workflow_dispatch:

# Prevent concurrent runs on the same ref+event (include event_name so that a
# pull_request closed event on main doesn't cancel a concurrent push-to-main run)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      VITE_SENTRY_DSN: https://test@test.ingest.sentry.io/123
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm format:check

      - name: Run lint
        run: pnpm lint:ci

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:ci

      - name: Build application
        run: pnpm build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: apps/www
    env:
      DATABASE_URL: file:test.db
      BETTER_AUTH_SECRET: test-secret-for-ci-minimum-32-characters
      BETTER_AUTH_URL: http://localhost:5174
      VITE_SENTRY_DSN: https://test@test.ingest.sentry.io/123
      # Photos service + shared LocalStack S3 config for E2E
      PHOTOS_BASE_URL: http://localhost:8080
      STORAGE_PROVIDER: tigris
      AWS_ENDPOINT_URL_S3: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      BUCKET_NAME: pmf-e2e-bucket
      MEDIA_ORIGIN: http://localhost:4566/pmf-e2e-bucket
      INTERNAL_TOKEN: e2e-test-token
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Build photos service
        working-directory: .
        run: pnpm --filter @pmf/photos build

      - name: Start LocalStack
        working-directory: .
        run: |
          docker run --rm -d \
            --name pmf-photos-localstack-e2e \
            -p 4566:4566 \
            -e SERVICES=s3 \
            localstack/localstack:4
          for i in $(seq 1 60); do
            if ! docker inspect pmf-photos-localstack-e2e >/dev/null 2>&1; then
              echo "ERROR: LocalStack stopped unexpectedly" >&2; exit 1
            fi
            if curl -sf "http://localhost:4566/_localstack/health" | grep -qE '"s3"\s*:\s*"(running|available)"'; then
              echo "LocalStack ready after ${i}s"; break
            fi
            [ $i -eq 60 ] && echo "ERROR: LocalStack not ready in 60s" >&2 && exit 1
            sleep 1
          done
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=us-east-1 \
            aws --endpoint-url=http://localhost:4566 s3 mb s3://pmf-e2e-bucket

      - name: Start photos service
        working-directory: .
        run: |
          STORAGE_PROVIDER=tigris \
          AWS_ENDPOINT_URL_S3=http://localhost:4566 \
          AWS_ACCESS_KEY_ID=test \
          AWS_SECRET_ACCESS_KEY=test \
          AWS_REGION=us-east-1 \
          BUCKET_NAME=pmf-e2e-bucket \
          INTERNAL_TOKEN=e2e-test-token \
          PORT=8080 \
          NODE_ENV=production \
            node apps/photos/dist/index.js &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Photos service ready after ${i}s"; break
            fi
            [ $i -eq 30 ] && echo "ERROR: Photos service not ready in 30s" >&2 && exit 1
            sleep 1
          done

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/www/playwright-report/
          retention-days: 7

  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request'
    environment:
      name: preview
      url: ${{ steps.pr.outputs.number != '' && format('https://pickmyfruit-pr-{0}.fly.dev', steps.pr.outputs.number) || '' }}
    steps:
      - name: Find open PR for branch
        id: pr
        run: |
          NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo '')
          echo "number=${NUMBER:-}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        if: steps.pr.outputs.number != ''

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.pr.outputs.number != ''

      - name: Set app name
        if: steps.pr.outputs.number != ''
        run: echo "APP_NAME=pickmyfruit-pr-${{ steps.pr.outputs.number }}" >> $GITHUB_ENV

      - name: Create app (idempotent)
        if: steps.pr.outputs.number != ''
        # status 1 means "name taken", which we can ignore; bubble other errors
        run: flyctl apps create $APP_NAME --org personal || [ $? -eq 1 ]
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set secrets
        if: steps.pr.outputs.number != ''
        run: |
          flyctl secrets set --app $APP_NAME \
            BETTER_AUTH_SECRET="${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}" \
            BETTER_AUTH_URL="https://$APP_NAME.fly.dev" \
            HMAC_SECRET="${{ secrets.PREVIEW_HMAC_SECRET }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        if: steps.pr.outputs.number != ''
        run: ./bin/deploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ env.APP_NAME }}
          FLY_CONFIG: fly.preview.toml
          FLY_HA: "false"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: preview

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://www.pickmyfruit.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: ./bin/deploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ERROR_SAMPLE_RATE: ${{ vars.VITE_SENTRY_ERROR_SAMPLE_RATE }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}

  destroy:
    name: Destroy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy app
        run: flyctl apps destroy pickmyfruit-pr-${{ github.event.pull_request.number }} --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

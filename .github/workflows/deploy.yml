name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    types: [closed]
  workflow_dispatch:

# Prevent concurrent runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detects whether the pushed branch has an open PR.
  # Runs in parallel with `test`; result is consumed by `preview`.
  context:
    name: Detect PR
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      pr-number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Find open PR for branch
        id: pr
        run: |
          NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo '')
          echo "number=${NUMBER:-}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      VITE_SENTRY_DSN: https://test@test.ingest.sentry.io/123
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm format:check

      - name: Run lint
        run: pnpm lint:ci

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:ci

      - name: Build application
        run: pnpm build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/www
    env:
      DATABASE_URL: file:test.db
      BETTER_AUTH_SECRET: test-secret-for-ci-minimum-32-characters
      BETTER_AUTH_URL: http://localhost:5174
      VITE_SENTRY_DSN: https://test@test.ingest.sentry.io/123
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/www/playwright-report/
          retention-days: 7

  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [test, context]
    if: needs.context.outputs.pr-number != ''
    environment:
      name: preview
      url: https://pickmyfruit-pr-${{ needs.context.outputs.pr-number }}.fly.dev
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set app name
        run: echo "APP_NAME=pickmyfruit-pr-${{ needs.context.outputs.pr-number }}" >> $GITHUB_ENV

      - name: Create app (idempotent)
        # status 1 means "name taken", which we can ignore; bubble other errors
        run: flyctl apps create $APP_NAME --org personal || [ $? -eq 1 ]
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set secrets
        run: |
          flyctl secrets set --app $APP_NAME \
            BETTER_AUTH_SECRET="${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}" \
            BETTER_AUTH_URL="https://$APP_NAME.fly.dev" \
            HMAC_SECRET="${{ secrets.PREVIEW_HMAC_SECRET }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: ./bin/deploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ env.APP_NAME }}
          FLY_CONFIG: fly.preview.toml
          FLY_HA: "false"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: preview

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://www.pickmyfruit.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: ./bin/deploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ERROR_SAMPLE_RATE: ${{ vars.VITE_SENTRY_ERROR_SAMPLE_RATE }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}

  destroy:
    name: Destroy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy app
        run: flyctl apps destroy pickmyfruit-pr-${{ github.event.pull_request.number }} --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# Fly.io configuration for Pick My Fruit
# See https://fly.io/docs/reference/configuration/ for more options

# App name - replace with your actual app name when deploying
app = 'pickmyfruit'

# Primary region - SJC (San Jose) is closest to Napa, CA
primary_region = 'sjc'

# Build configuration — one image, two entrypoints.
[build]
  dockerfile = "Dockerfile"
  ignorefile = ".dockerignore"

  # VITE_* vars are baked into the JS bundle at build time by Vite.
  # Fly secrets are runtime-only, so they can't be used for build-time vars.
  # See Dockerfile ARGs and apps/www/src/lib/env.client.ts.
  # Pass VITE_SENTRY_DSN via: flyctl deploy --build-arg VITE_SENTRY_DSN=...
  # Pass VITE_SENTRY_ERROR_SAMPLE_RATE and VITE_SENTRY_TRACES_SAMPLE_RATE
  # similarly to tune sampling without changing defaults in env.client.ts.
  [build.args]
    VITE_SENTRY_ENABLED = "true"

# Process-group entrypoints. One Docker image, two runtime personas.
# Both commands are relative to WORKDIR /app in the runner stage.
[processes]
  # NODE_OPTIONS is set here (not in [env]) so it applies to web only.
  # photos does its heavy lifting in native libvips, not the V8 heap.
  web    = "NODE_OPTIONS='--max-old-space-size=384' node .output/server/index.mjs"
  photos = "node apps/photos/dist/index.js"

# Public ingress — web process group only.
[http_service]
  internal_port = 3000
  force_https = false # handled in @/middleware/tls
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']
  # max_machines = 1 — keep to avoid duplicate reconciliation sweeps.
  # reconcilePendingPhotos is idempotent but concurrent machines issue
  # redundant headPhoto requests to the photo service.

  # HTTP request timeouts.
  # NOTE: photo uploads are also gated by an in-process queue
  # (MAX_UPLOAD_QUEUE_DEPTH in apps/www/src/lib/listing-photo-upload.server.ts)
  # which sheds with 503 well below this proxy-level cap.
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  # Health check configuration
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'
    protocol = 'http'

    [http_service.checks.headers]
      # Accept JSON response
      Accept = 'application/json'

# Flycast — photos process group only; private to the Fly org, auto-start on demand.
# Flycast puts Fly Proxy in front of this internal service so callers trigger
# auto-start. See https://fly.io/docs/blueprints/private-applications-flycast/
# Web reaches photos at http://pickmyfruit.flycast:8080 (set via PHOTOS_BASE_URL).
[[services]]
  internal_port        = 8080
  protocol             = "tcp"
  processes            = ["photos"]
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[services.ports]]
    port     = 8080
    handlers = ["http"]

  [[services.checks]]
    interval   = '30s'
    timeout    = '5s'
    grace_period = '15s'
    method     = 'GET'
    path       = '/health'
    protocol   = 'http'

# Persistent volume for SQLite database (web only; photos has no persistence).
[mounts]
  source    = 'data'
  destination = '/app/data'
  initial_size = '1gb'
  processes = ['web']

# Environment variables shared by all process groups.
# NODE_OPTIONS is NOT here — it lives in [processes].web so the V8 heap cap
# only applies to the web process. docker-compose.yml sets it in environment:
# for the same reason.
[env]
  EMAIL_PROVIDER = 'resend'
  # Cap glibc malloc arenas — fewer per-thread arenas means lower RSS for
  # native-binary workloads (libvips, AWS SDK threads). Free, well-known.
  MALLOC_ARENA_MAX = '2'
  MIGRATE_ON_REQUEST = 'true'
  NODE_ENV = 'production'
  MEDIA_ORIGIN = 'https://media.pickmyfruit.com'
  STORAGE_PROVIDER = 'tigris'
  # libuv default is 4. On a 1-CPU shared VM the extra threads buy memory
  # pressure with no real parallelism. Keep 2 so I/O and TLS can overlap.
  UV_THREADPOOL_SIZE = '2'
  # Web reaches the photos service over Fly's internal Flycast network.
  # Override with PHOTOS_BASE_URL Fly secret if the hostname ever changes.
  PHOTOS_BASE_URL = 'http://pickmyfruit.flycast:8080'

# VM resources — scoped per process group.
# IMPORTANT: keep processes = [...] on every [[vm]] block; an unscoped block
# applies to ALL process groups and would size photos at 512 MB or web at 256 MB.
[[vm]]
  processes = ['web']
  size      = 'shared-cpu-1x'
  memory    = '512mb'
  cpus      = 1

# photos can run in less memory: no SQLite, no Nitro, pure transform pipeline.
# Bumped to 512 MB from plan's 256 MB: a single 12 MP iPhone JPEG drives
# Sharp RSS up ~120 MB; 512 MB matches web and gives comfortable headroom.
[[vm]]
  processes = ['photos']
  size      = 'shared-cpu-1x'
  memory    = '512mb'
  cpus      = 1

# Deployment configuration
[deploy]
  strategy = 'immediate'
  max_unavailable = 0.5

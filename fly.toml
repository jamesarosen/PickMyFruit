# Fly.io configuration for Pick My Fruit
# See https://fly.io/docs/reference/configuration/ for more options

# App name - replace with your actual app name when deploying
app = 'pickmyfruit'

# Primary region - SJC (San Jose) is closest to Napa, CA
primary_region = 'sjc'

# Build configuration
[build]
  dockerfile = "apps/www/Dockerfile"
  ignorefile = ".dockerignore"

  # VITE_* vars are baked into the JS bundle at build time by Vite.
  # Fly secrets are runtime-only, so they can't be used for build-time vars.
  # See Dockerfile ARGs and apps/www/src/lib/env.client.ts.
  # Pass VITE_SENTRY_DSN via: flyctl deploy --build-arg VITE_SENTRY_DSN=...
  # Pass VITE_SENTRY_ERROR_SAMPLE_RATE and VITE_SENTRY_TRACES_SAMPLE_RATE
  # similarly to tune sampling without changing defaults in env.client.ts.
  [build.args]
    VITE_SENTRY_ENABLED = "true"

# Process groups. The web app is the only long-running process.
#
# `resend_sync` runs as a Fly **scheduled machine** (hourly), not a process
# group — `[processes]` machines stay always-on, which would burn CPU/RAM/$
# for a job that's idle 99% of the time. Provision once with:
#
#   fly machine run . \
#     --schedule hourly \
#     --restart no \
#     --command "node apps/resend-sync/dist/main.js" \
#     --region sjc \
#     --volume data:/app/data
#
# The machine boots on its schedule, drains the user queue, and exits 0.
# See docs/0007-resend-sync-cron.md.
[processes]
  app = "node .output/server/index.mjs"

# HTTP service configuration
[http_service]
  internal_port = 3000
  force_https = false # handled in @/middleware/tls
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # HTTP request timeouts.
  # NOTE: photo uploads are also gated by an in-process queue
  # (MAX_UPLOAD_QUEUE_DEPTH in apps/www/src/lib/listing-photo-upload.server.ts)
  # which sheds with 503 well below this proxy-level cap.
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  # Health check configuration
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'
    protocol = 'http'

    [http_service.checks.headers]
      # Accept JSON response
      Accept = 'application/json'

# Persistent volume for SQLite database and resend-sync cursor file. The
# scheduled `resend_sync` machine attaches the same `data` volume via its
# `--volume` flag at `fly machine run` time (see process-group comment above).
[[mounts]]
  source = 'data'
  destination = '/app/data'
  initial_size = '1gb'
  processes = ['app']

# Environment variables
# NODE_OPTIONS and SHARP_CONCURRENCY are mirrored in docker-compose.yml so
# local runs reproduce production memory behavior. Keep these in sync.
[env]
  EMAIL_PROVIDER = 'resend'
  # Cap glibc malloc arenas — fewer per-thread arenas means lower RSS for
  # native-binary workloads (libvips, AWS SDK threads). Free, well-known.
  MALLOC_ARENA_MAX = '2'
  MIGRATE_ON_REQUEST = 'true'
  NODE_ENV = 'production'
  MEDIA_ORIGIN = 'https://media.pickmyfruit.com'
  # Cap V8 heap at ~75% of the 512 MB VM so GC fires before Linux OOM-kills,
  # leaving headroom for libvips native allocations and the OS.
  NODE_OPTIONS = '--max-old-space-size=384'
  # Serialize libvips work — the VM is still 1 shared CPU, so parallel image
  # processing buys memory pressure without real throughput.
  SHARP_CONCURRENCY = '1'
  STORAGE_PROVIDER = 'tigris'
  # resend-sync scheduled machine: reach the web process over Fly's private 6PN
  # network. The TLS middleware skips the HTTPS redirect for *.flycast hosts.
  INTERNAL_API_URL = 'http://pickmyfruit.flycast'
  RESEND_SYNC_CURSOR_PATH = '/app/data/resend-sync/cursor.json'
  RESEND_API_RATE_PER_SEC = '4'
  RESEND_API_BUCKET_CAPACITY = '4'
  SENTRY_ENABLED = 'true'
  SENTRY_ENVIRONMENT = 'production'
  # libuv default is 4. On a 1-CPU shared VM the extra threads buy memory
  # pressure with no real parallelism. Keep 2 so I/O and TLS can overlap.
  UV_THREADPOOL_SIZE = '2'

# VM resources
# Memory and CPU limits are mirrored in docker-compose.yml's deploy.resources.
# Bumped from 256 MB to 512 MB on 2026-04-27: a single 12 MP iPhone JPEG drives
# RSS up ~120 MB inside Sharp (libvips decoded RGBA + intermediate buffers),
# leaving no margin for the rest of the process. 512 MB gives Sharp comfortable
# headroom while still being a small VM.
[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1

# Deployment configuration
[deploy]
  strategy = 'immediate'
  max_unavailable = 0.5

services:
  web:
    build:
      context: .
      dockerfile: apps/www/Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_SENTRY_ENABLED: ${VITE_SENTRY_ENABLED}
    ports:
      - "3000:3000"
    volumes:
      # Mount local data directory for SQLite persistence
      - ./apps/www/data:/app/data
    env_file:
      - path: ./apps/www/.env.development.local
        required: false
      - path: ./apps/www/.env.development
        required: false
      - path: ./apps/www/.env
        required: false
      - path: .env
        required: false
    # Memory limits and NODE_OPTIONS / SHARP_CONCURRENCY mirror the Fly
    # production VM (see fly.toml [[vm]] and [env]) so local runs can reproduce
    # OOM behavior. Keep these in sync with fly.toml.
    environment:
      BETTER_AUTH_URL: http://localhost:3000
      NODE_ENV: development
      DATABASE_URL: file:/app/data/development.db
      # V8 heap capped at ~75% of the VM so GC fires before the OS OOM-kills,
      # leaving headroom for libvips native allocations.
      NODE_OPTIONS: --max-old-space-size=384
      # Serialize libvips — the VM is 1 shared CPU; parallel image work just
      # bloats RSS without throughput gain.
      SHARP_CONCURRENCY: "1"
      # glibc default is up to 8 arenas/CPU, each reserving ~64 MB. Capping at 2
      # significantly lowers RSS for Node + native-binary workloads.
      MALLOC_ARENA_MAX: "2"
      # libuv default is 4. On 1 shared CPU the extra threads buy memory
      # pressure with no real parallelism. Keep 2 so I/O and TLS can overlap.
      UV_THREADPOOL_SIZE: "2"
    deploy:
      resources:
        limits:
          # Mirrors fly.toml [[vm]]. Bumped to 512 MB on 2026-04-27 because a
          # single 12 MP iPhone JPEG drives RSS up ~120 MB inside Sharp.
          memory: 512M
          cpus: "1"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # Local stand-in for the production scheduled machine (see fly.toml). Drains
  # the user queue once and exits. Compose's `restart: unless-stopped` will
  # restart it after each exit, giving "poll every few seconds" behaviour for
  # local dev without bringing the scheduled-machine pattern into Compose.
  resend_sync:
    build:
      context: .
      dockerfile: apps/www/Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_SENTRY_ENABLED: ${VITE_SENTRY_ENABLED}
    command: ["node", "apps/resend-sync/dist/main.js"]
    depends_on:
      web:
        condition: service_healthy
    volumes:
      # Same volume as `web` — the worker writes /app/data/resend-sync/cursor.json
      # and only `web` opens the SQLite file.
      - ./apps/www/data:/app/data
    env_file:
      - path: ./apps/www/.env.development.local
        required: false
      - path: ./apps/www/.env.development
        required: false
      - path: ./apps/www/.env
        required: false
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      # Talk to the `web` service over Docker's user-defined network.
      # The TLS middleware's `.flycast` carve-out does not apply here, so
      # the URL must be plain http://web:3000 (no x-forwarded-proto=https).
      INTERNAL_API_URL: http://web:3000
      # Override the dev default (which points at apps/www/data/ via a
      # relative path) so the worker writes inside the shared /app/data mount.
      RESEND_SYNC_CURSOR_PATH: /app/data/resend-sync/cursor.json
      # No real Resend credentials in the dev image. Set RESEND_API_KEY in
      # .env to exercise the real Resend flow.
      SENTRY_ENVIRONMENT: resend-sync
    restart: unless-stopped

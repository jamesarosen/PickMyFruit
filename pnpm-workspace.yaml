minimumReleaseAge: 4320 # 3 days
blockExoticSubdeps: true

# Pin transitive deps to patched releases (Dependabot / pnpm audit).
overrides:
  "@tanstack/start-server-core": "1.169.4"
  brace-expansion@2: "2.0.3"
  brace-expansion@5: "5.0.6"
  defu: "6.1.7"
  esbuild@0.18.20: "0.25.12"
  follow-redirects: "1.16.0"
  h3@1.15.3: "1.15.9"
  lodash: "4.18.1"
  minimatch@5: "5.1.9"
  minimatch@9: "9.0.9"
  nitropack: "2.13.4"
  node-forge: "1.4.0"
  picomatch@2: "2.3.2"
  picomatch@4: "4.0.4"
  protocol-buffers-schema: "3.6.1"
  rollup: "4.60.4"
  serialize-javascript: "7.0.5"
  tar: "7.5.15"
  vite@6: "6.4.2"
  ws: "8.20.1"
  yaml: "2.9.0"

supportedArchitectures:
  os:
    - linux
    - darwin
  cpu:
    - x64
    - arm64

packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  esbuild: true
  sharp: true

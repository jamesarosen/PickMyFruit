# Fly.io configuration for PR preview apps.
# App name is set dynamically via --app when deploying.
# See .github/workflows/deploy.yml (preview job). This file replaces fly.toml
# for those deploys — copy runtime vars from fly.toml [env] when needed.

primary_region = 'sjc'

[processes]
  app = "node .output/server/index.mjs"
  resend_sync = "node apps/resend-sync/dist/main.js"

[build]
  dockerfile = "apps/www/Dockerfile"
  ignorefile = ".dockerignore"

  [build.args]
    VITE_SENTRY_ENABLED = "true"

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'
    protocol = 'http'

# Persistent volume for SQLite database, cursor file, and local file uploads.
# Fly creates the volume automatically on first deploy if it does not exist.
[[mounts]]
  source = 'data'
  destination = '/app/data'
  initial_size = '1gb'
  processes = ['app', 'resend_sync']

[env]
  DATA_DIR = '/app/data'
  DATABASE_URL = 'file:/app/data/db.sqlite'
  EMAIL_FROM = 'Pick My Fruit Preview <preview@pickmyfruit.com>'
  EMAIL_PROVIDER = 'console'
  MIGRATE_ON_REQUEST = 'true'
  NODE_ENV = 'development'
  STORAGE_PROVIDER = 'local'
  MEDIA_ORIGIN = 'https://media.pickmyfruit.com'
  # resend-sync worker env (INTERNAL_API_URL and INTERNAL_API_SECRET are Fly secrets).
  RESEND_SYNC_CURSOR_PATH = '/app/data/resend-sync/cursor.json'
  RESEND_SYNC_POLL_MS = '60000'
  RESEND_API_RATE_PER_SEC = '4'
  RESEND_API_BUCKET_CAPACITY = '4'
  SENTRY_ENVIRONMENT = 'resend-sync-preview'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1

[deploy]
  strategy = 'immediate'
